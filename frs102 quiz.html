<style>
:root{
  --blue-900:#0f2044;--blue-800:#1a3260;--blue-700:#1e3a8a;--blue-600:#1d4ed8;
  --blue-500:#3b82f6;--blue-100:#dbeafe;--blue-50:#eff6ff;
  --white:#fff;--grey-50:#f9fafb;--grey-100:#f3f4f6;--grey-200:#e5e7eb;
  --grey-400:#9ca3af;--grey-600:#4b5563;--grey-800:#1f2937;
  --green-100:#dcfce7;--red-500:#ef4444;--red-100:#fee2e2;
  --font:Inter,'Segoe UI',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:var(--font);background:var(--grey-50);color:var(--grey-800);line-height:1.6;min-height:100vh}
.page-center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px;background:linear-gradient(160deg,var(--blue-900) 0%,var(--blue-800) 40%,#0c1a3a 100%)}
.card{background:var(--white);border-radius:20px;box-shadow:0 12px 40px rgba(0,0,0,.1);padding:48px 40px;width:100%}
.logo-badge{display:inline-block;background:var(--blue-700);color:var(--white);font-size:11px;font-weight:700;letter-spacing:.12em;padding:4px 12px;border-radius:999px;margin-bottom:20px}
/* Entry */
.entry-card{max-width:480px}
.entry-title{font-size:2rem;font-weight:800;color:var(--blue-900);letter-spacing:-.03em;margin-bottom:6px}
.entry-subtitle{font-size:.875rem;color:var(--grey-600);margin-bottom:28px}
.entry-rules{background:var(--blue-50);border:1px solid var(--blue-100);border-radius:12px;padding:18px 20px;margin-bottom:28px;display:flex;flex-direction:column;gap:10px}
.rule-item{display:flex;align-items:flex-start;gap:10px;font-size:.85rem;color:var(--grey-600)}
.field-label{display:block;font-size:.8rem;font-weight:600;color:var(--grey-600);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.field-input{width:100%;padding:12px 16px;border:1.5px solid var(--grey-200);border-radius:6px;font-size:1rem;font-family:var(--font);color:var(--grey-800);background:var(--white);outline:none;margin-bottom:6px;transition:border-color .15s}
.field-input:focus{border-color:var(--blue-500);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.field-input.err{border-color:var(--red-500)}
.field-error{font-size:.8rem;color:var(--red-500);margin-bottom:12px}
.btn-primary{width:100%;padding:14px;background:var(--blue-700);color:var(--white);border:none;border-radius:6px;font-size:1rem;font-weight:700;font-family:var(--font);cursor:pointer;margin-top:16px;transition:background .15s}
.btn-primary:hover{background:var(--blue-800)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
/* Quiz header */
.quiz-header{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:1px solid var(--grey-200);box-shadow:0 1px 3px rgba(0,0,0,.06)}
.quiz-header-inner{max-width:760px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
.header-logo{font-size:.85rem;font-weight:700;color:var(--blue-900);letter-spacing:.04em}
.header-meta{display:flex;align-items:center;gap:20px}
.answered-count{font-size:.8rem;color:var(--grey-600);font-weight:500}
.timer{font-size:.95rem;font-weight:700;font-family:monospace;color:var(--blue-700);background:var(--blue-50);border:1px solid var(--blue-100);padding:4px 12px;border-radius:999px;transition:all .3s}
.timer.urgent{color:var(--white);background:var(--red-500);border-color:var(--red-500);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.75}}
.progress-bar-wrap{height:3px;background:var(--grey-100)}
.progress-bar-fill{height:100%;background:var(--blue-600);transition:width .4s ease}

.quiz-page{background:var(--grey-50);min-height:100vh}
.quiz-main{max-width:760px;margin:0 auto;padding:32px 24px 80px}
.quiz-intro{margin-bottom:24px}
.quiz-student-name{font-size:.9rem;color:var(--grey-600)}
.question-card{background:var(--white);border-radius:12px;padding:28px;margin-bottom:20px;border:1.5px solid var(--grey-200);box-shadow:0 1px 3px rgba(0,0,0,.06);transition:border-color .2s}
.question-card.answered{border-color:#bfdbfe}
.question-number{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--blue-600);margin-bottom:10px}
.question-text{font-size:1rem;font-weight:600;color:var(--grey-800);margin-bottom:20px;line-height:1.5}
.options-list{display:flex;flex-direction:column;gap:8px}
.option-btn{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:12px 16px;border:1.5px solid var(--grey-200);border-radius:6px;background:var(--white);cursor:pointer;font-family:var(--font);font-size:.9rem;color:var(--grey-800);transition:border-color .15s,background .15s}
.option-btn:hover{border-color:var(--blue-500);background:var(--blue-50)}

.option-letter{width:28px;height:28px;border-radius:50%;background:var(--grey-100);color:var(--grey-600);font-size:.8rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,color .15s}
.option-btn.selected .option-letter{background:var(--blue-700);color:var(--white)}
.submit-zone{text-align:center;padding:32px 0 0}
.submit-hint{font-size:.875rem;color:var(--grey-600);margin-bottom:16px}
.btn-submit{max-width:300px;margin:0 auto}

.result-card{max-width:440px;text-align:center}
.result-title{font-size:1.6rem;font-weight:800;color:var(--blue-900);margin-bottom:4px}
.result-name{font-size:1rem;color:var(--grey-600);margin-bottom:28px}
.result-ring{width:140px;height:140px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 28px;background:var(--white);box-shadow:0 0 0 4px rgba(0,0,0,.04)}

.result-score-denom{font-size:1rem;font-weight:500;color:var(--grey-400)}
.result-score-pct{font-size:1rem;font-weight:600;color:var(--grey-600);margin-top:2px}

.stat-value{font-size:2rem;font-weight:800;color:var(--blue-900);line-height:1}
.stat-sub{font-size:.8rem;color:var(--grey-400)}
.table-wrap{overflow-x:auto;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.results-table{width:100%;border-collapse:collapse;background:var(--white);font-size:.875rem}

.results-table th:hover{background:var(--blue-800)}
.results-table td{padding:13px 18px;border-bottom:1px solid var(--grey-100);color:var(--grey-800)}
.results-table tbody tr:last-child td{border-bottom:none}
.results-table tbody tr:hover td{background:var(--blue-50)}
.td-name{font-weight:600;color:var(--blue-900)}
.td-score{font-family:monospace;font-weight:600}
.td-date{font-size:.8rem;color:var(--grey-400);white-space:nowrap}
.pct-badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:.78rem;font-weight:700}
.pct-pass{background:var(--green-100);color:#166534}
.pct-fail{background:var(--red-100);color:#991b1b}
.badge-auto{background:var(--red-100);color:#991b1b;padding:2px 8px;border-radius:999px;font-size:.75rem;font-weight:600}
.badge-manual{background:var(--green-100);color:#166534;padding:2px 8px;border-radius:999px;font-size:.75rem;font-weight:600}
.admin-empty{background:var(--white);border-radius:12px;padding:60px 40px;text-align:center;color:var(--grey-400);border:1px dashed var(--grey-200)}
.admin-error{color:var(--red-500);text-align:center;padding:40px}

  .question-card{padding:20px}
  .admin-main{padding:20px 16px 60px}
  .admin-header-inner{padding:0 16px}
}
</style>

function EntryPage({onStart}){
  const [name,setName]=useState("");
  const [err,setErr]=useState("");
  function go(){
    const n=name.trim();
    if(!n){setErr("Please enter your name before starting.");return;}
    onStart(n);
  }
  return(
    <div className="page-center">
      <div className="card entry-card">
        <div className="logo-badge">OOUMSA</div>
        <h1 className="entry-title">FRS102 TEST</h1>
        <p className="entry-subtitle">Introductory Forensic Science · 50 Questions · 20 Minutes</p>
        <div className="entry-rules">
          <div className="rule-item"><span>⏱</span><span>You have exactly <strong>20 minutes</strong>. The test auto-submits when time runs out.</span></div>
          <div className="rule-item"><span>📋</span><span>50 multiple-choice questions covering all topics.</span></div>
          <div className="rule-item"><span>🔒</span><span>Once you start, you cannot pause.</span></div>
        </div>
        <label className="field-label" htmlFor="nid">Your name or identifier</label>
        <input id="nid" className={`field-input${err?" err":""}`} type="text" placeholder="e.g. Chidi Okeke"
          value={name} onChange={e=>{setName(e.target.value);setErr("");}}
          onKeyDown={e=>e.key==="Enter"&&go()} autoFocus/>
        {err&&<p className="field-error">{err}</p>}
        <button className="btn-primary" onClick={go}>Start Test</button>
      </div>
    </div>
  );
}

    setSubmitting(true);
    clearInterval(timerRef.current);
    const elapsed=Math.round((Date.now()-startTime.current)/1000);
    let score=0;
    QUESTIONS.forEach(q=>{if(answers[q.id]===q.ans)score++;});
    onSubmit({studentName,answers,score,elapsed,auto});
  },[submitting,answers,studentName,onSubmit]);

  useEffect(()=>{
    timerRef.current=setInterval(()=>{
      setTimeLeft(t=>{
        if(t<=1){clearInterval(timerRef.current);submit(true);return 0;}
        return t-1;
      });
    },1000);
    return()=>clearInterval(timerRef.current);
  },[submit]);

  const urgent=timeLeft<=120;
  return(
    <div className="quiz-page">
      <header className="quiz-header">
        <div className="quiz-header-inner">
          <span className="header-logo">OOUMSA · FRS102</span>
          <div className="header-meta">
            <span className="answered-count">{answered}/{TOTAL} answered</span>
            <span className={`timer${urgent?" urgent":""}`}>⏱ {fmt(timeLeft)}</span>
          </div>
        </div>
        <div className="progress-bar-wrap">
          <div className="progress-bar-fill" style={{width:`${progress}%`}}/>
        </div>
      </header>
      <main className="quiz-main">
        <div className="quiz-intro"><p className="quiz-student-name">Hi, <strong>{studentName}</strong> — good luck.</p></div>
        {QUESTIONS.map((q,idx)=>(
          <div key={q.id} className={`question-card${answers[q.id]!==undefined?" answered":""}`}>
            <div className="question-number">Question {idx+1} of {TOTAL}</div>
            <p className="question-text">{q.q}</p>
            <div className="options-list">
              {q.opts.map((opt,oi)=>(
                <button key={oi} className={`option-btn${answers[q.id]===oi?" selected":""}`}
                  onClick={()=>setAnswers(prev=>({...prev,[q.id]:oi}))}>
                  <span className="option-letter">{OPTS[oi]}</span>
                  <span>{opt}</span>
                </button>
              ))}
            </div>
          </div>
        ))}
        <div className="submit-zone">
          <p className="submit-hint">{TOTAL-answered>0?`${TOTAL-answered} question${TOTAL-answered>1?"s":""} still unanswered.`:"All questions answered — ready to submit!"}</p>
          <button className="btn-primary btn-submit" onClick={()=>submit(false)} disabled={submitting}>
            {submitting?"Submitting…":"Submit Test"}
          </button>
        </div>
      </main>
    </div>
  );
}

function ResultPage({result}){
  const pct=Math.round((result.score/TOTAL)*100);
  const pass=pct>=70;
  const color=pass?"#22c55e":"#ef4444";
  return(
    <div className="page-center">
      <div className="card result-card">
        <div className="logo-badge">OOUMSA</div>
        <h2 className="result-title">Test Submitted</h2>
        <p className="result-name">{result.studentName}</p>
        <div className="result-ring" style={{border:`8px solid ${color}`}}>
          <span className="result-score-num">{result.score}<span className="result-score-denom">/{TOTAL}</span></span>
          <span className="result-score-pct">{pct}%</span>
        </div>
        <div className="result-meta">
          <div className="result-meta-item"><span>Grade</span><strong style={{color}}>{pass?"Pass":"Below Pass"}</strong></div>
          <div className="result-meta-item"><span>Time taken</span><strong>{dur(result.elapsed)}</strong></div>
          <div className="result-meta-item"><span>Answered</span><strong>{Object.keys(result.answers).length}/{TOTAL}</strong></div>
        </div>
        {result.auto&&<p className="result-auto-note">⏱ Time ran out — test was automatically submitted.</p>}
        <p className="result-footer">Your result has been recorded. You may close this tab.</p>
      </div>
    </div>
  );
}

function AdminPage(){
  const [results,setResults]=useState([]);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState("");
  const [sortBy,setSortBy]=useState("submitted_at");
  const [sortDir,setSortDir]=useState("desc");

  useEffect(()=>{
    fetchResults().then(d=>{setResults(d||[]);setLoading(false);}).catch(()=>{setError("Could not load results.");setLoading(false);});
  },[]);

  function toggleSort(col){
    if(sortBy===col)setSortDir(d=>d==="asc"?"desc":"asc");
    else{setSortBy(col);setSortDir("desc");}
  }

  const sorted=[...results].sort((a,b)=>{
    let av=a[sortBy],bv=b[sortBy];
    if(typeof av==="string"){av=av.toLowerCase();bv=bv.toLowerCase();}
    return sortDir==="asc"?(av>bv?1:-1):(av<bv?1:-1);
  });

  const avg=results.length?Math.round(results.reduce((s,r)=>s+r.score,0)/results.length):0;
  const avgT=results.length?Math.round(results.reduce((s,r)=>s+r.elapsed_seconds,0)/results.length):0;
  const passing=results.filter(r=>r.score/TOTAL>=0.7).length;
  const highest=results.length?Math.max(...results.map(r=>r.score)):0;
  const si=col=>sortBy===col?(sortDir==="asc"?" ↑":" ↓"):" ↕";

  return(
    <div className="admin-page">
      <header className="admin-header">
        <div className="admin-header-inner">
          <div>
            <div className="logo-badge">OOUMSA</div>
            <h1 className="admin-title">FRS102 Test Results</h1>
            <p className="admin-subtitle">Introductory Forensic Science · Admin Dashboard</p>
          </div>
          <div className="admin-badge">{results.length} submission{results.length!==1?"s":""}</div>
        </div>
      </header>
      <main className="admin-main">
        <div className="stats-grid">
          <div className="stat-card"><span className="stat-label">Average Score</span><span className="stat-value">{avg}/{TOTAL}</span><span className="stat-sub">{results.length?Math.round(avg/TOTAL*100):0}%</span></div>
          <div className="stat-card"><span className="stat-label">Highest Score</span><span className="stat-value">{highest}/{TOTAL}</span><span className="stat-sub">{results.length?Math.round(highest/TOTAL*100):0}%</span></div>
          <div className="stat-card"><span className="stat-label">Pass Rate (≥70%)</span><span className="stat-value">{passing}</span><span className="stat-sub">of {results.length} students</span></div>
          <div className="stat-card"><span className="stat-label">Avg. Time Spent</span><span className="stat-value">{dur(avgT)}</span><span className="stat-sub">per student</span></div>
        </div>
        {loading&&<p style={{textAlign:"center",color:"var(--grey-400)",padding:"40px"}}>Loading results…</p>}
        {error&&<p className="admin-error">{error}</p>}
        {!loading&&!error&&results.length===0&&<div className="admin-empty">No submissions yet. Share the quiz link with your students.</div>}
        {!loading&&results.length>0&&(
          <div className="table-wrap">
            <table className="results-table">
              <thead>
                <tr>
                  <th onClick={()=>toggleSort("student_name")}>Name{si("student_name")}</th>
                  <th onClick={()=>toggleSort("score")}>Score{si("score")}</th>
                  <th onClick={()=>toggleSort("score")}>%{si("score")}</th>
                  <th onClick={()=>toggleSort("elapsed_seconds")}>Time Spent{si("elapsed_seconds")}</th>
                  <th>Auto-submitted</th>
                  <th onClick={()=>toggleSort("submitted_at")}>Submitted{si("submitted_at")}</th>
                </tr>
              </thead>
              <tbody>
                {sorted.map((r,i)=>{
                  const pct=Math.round((r.score/TOTAL)*100);
                  const pass=pct>=70;
                  return(
                    <tr key={r.id||i}>
                      <td className="td-name">{r.student_name}</td>
                      <td className="td-score">{r.score}/{TOTAL}</td>
                      <td><span className={`pct-badge ${pass?"pct-pass":"pct-fail"}`}>{pct}%</span></td>
                      <td>{dur(r.elapsed_seconds)}</td>
                      <td>{r.auto_submitted?<span className="badge-auto">Yes</span>:<span className="badge-manual">No</span>}</td>
                      <td className="td-date">{new Date(r.submitted_at).toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"})}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </main>
    </div>
  );
}

function App(){
  const isAdmin=window.location.hash==="#admin";
  const [page,setPage]=useState("entry");
  const [studentName,setStudentName]=useState("");
  const [result,setResult]=useState(null);

  if(isAdmin)return <AdminPage/>;

  async function handleSubmit(payload){
    try{
      await saveResult({
        student_name:payload.studentName,
        score:payload.score,
        elapsed_seconds:payload.elapsed,
        auto_submitted:payload.auto,
        submitted_at:new Date().toISOString()
      });
    }catch(e){console.error("Save failed:",e);}
    setResult(payload);
    setPage("result");
  }

  if(page==="entry")return <EntryPage onStart={n=>{setStudentName(n);setPage("quiz");}}/>;
  if(page==="quiz")return <QuizPage studentName={studentName} onSubmit={handleSubmit}/>;
  if(page==="result")return <ResultPage result={result}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
